<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Conference Frame - Sankalp 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a0a0a;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    color: #fff;
  }
  h1 {
    color: #f0c040;
    font-size: 1.1rem;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(240,192,64,0.5);
  }

  /* ── POSTER WRAPPER ── */
  .poster-wrapper {
    position: relative;
    width: 100%;
    max-width: 420px;
    margin: 0 auto 20px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(180,120,0,0.5);
    display: block;
    line-height: 0;
  }
  .poster-bg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── PHOTO BOX ── exact pixel-measured values as % of poster ──
     Photo box: left=26.89%, top=39.88%, width=45.33%, height=21.69%
  */
  .photo-box {
    position: absolute;
    left:   26.89%;
    top:    39.88%;
    width:  45.33%;
    height: 21.69%;
    overflow: hidden;
    border-radius: 6px;
    background: transparent;
  }
  .photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* ── NAME PLATE ── exact pixel-measured values
     left=15.22%, top=62.31%, width=67.11%, height=5.69%
  */
  .name-plate {
    position: absolute;
    left:   15.22%;
    top:    62.31%;
    width:  67.11%;
    height: 5.69%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    overflow: hidden;
    pointer-events: none;
  }
  .name-plate span {
    color: #5a2e00;
    font-family: Georgia, serif;
    font-weight: bold;
    font-size: clamp(8px, 3vw, 18px);
    text-align: center;
    white-space: nowrap;
    max-width: 100%;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 1px rgba(255,255,255,0.4);
  }

  /* ── CONTROLS ── */
  .controls {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .control-group label.field-label {
    display: block;
    color: #f0c040;
    font-size: 0.85rem;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .control-group input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(240,192,64,0.4);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1rem;
    font-family: Georgia, serif;
    outline: none;
  }
  .control-group input[type="text"]:focus {
    border-color: #f0c040;
  }
  .upload-btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: 2px dashed rgba(240,192,64,0.5);
    background: rgba(240,192,64,0.08);
    color: #f0c040;
    font-size: 0.95rem;
    cursor: pointer;
    text-align: center;
    display: block;
    transition: background 0.2s;
  }
  .upload-btn:hover { background: rgba(240,192,64,0.18); }
  input[type="file"] { display: none; }
  .download-btn {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #b8860b, #f0c040);
    color: #1a0a0a;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: Georgia, serif;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(240,192,64,0.3);
    transition: opacity 0.2s;
  }
  .download-btn:hover { opacity: 0.9; }
  .download-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .hint {
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    text-align: center;
  }

  /* ── DEBUG TOGGLE ── */
  .debug-bar {
    width: 100%;
    max-width: 420px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .debug-bar label { color: rgba(255,255,255,0.4); font-size: 0.75rem; cursor: pointer; }
  .debug-bar input { cursor: pointer; }

  /* ── CROP MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #1c1008;
    border: 1px solid rgba(240,192,64,0.4);
    border-radius: 14px;
    padding: 20px;
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .modal-title { color: #f0c040; font-size: 1rem; text-align: center; }
  .crop-container { width: 100%; max-height: 58vh; overflow: hidden; border-radius: 8px; background: #000; }
  .crop-container img { max-width: 100%; display: block; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-apply {
    flex: 1; padding: 11px; border-radius: 8px; border: none;
    background: linear-gradient(135deg, #b8860b, #f0c040);
    color: #1a0a0a; font-weight: bold; font-size: 0.95rem; cursor: pointer;
  }
  .btn-cancel {
    flex: 1; padding: 11px; border-radius: 8px;
    border: 1px solid rgba(240,192,64,0.4);
    background: transparent; color: #f0c040; font-size: 0.95rem; cursor: pointer;
  }
</style>
</head>

    <span id="nameDisplay"></span>
  </div>

<!-- CONTROLS -->
<div class="controls">
  <div class="control-group">
    <label class="field-label">✏️ Your Name</label>
    <input type="text" id="nameInput" placeholder="Enter your full name" maxlength="60">
  </div>
  <div class="control-group">
    <label class="field-label">📸 Upload Your Photo</label>
    <label class="upload-btn" for="photoInput">📁 Choose Photo (JPG / PNG)</label>
    <input type="file" id="photoInput" accept="image/*">
  </div>
  <button class="download-btn" id="downloadBtn">⬇️ Download My Frame</button>
  <p class="hint">Upload photo → Crop → Enter name → Download ✅</p>
</div>

<!-- CROP MODAL -->
<div class="modal-overlay" id="cropModal">
  <div class="modal-box">
    <div class="modal-title">✂️ Crop Your Photo</div>
    <div class="crop-container">
      <img id="cropImage" src="" alt="Crop">
    </div>
    <div class="modal-btns">
      <button class="btn-apply" id="cropApplyBtn">✅ Apply</button>
      <button class="btn-cancel" id="cropCancelBtn">✖ Cancel</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── NAME ──
const nameInput  = document.getElementById('nameInput');
const nameDisplay = document.getElementById('nameDisplay');
nameInput.addEventListener('input', () => {
  nameDisplay.textContent = nameInput.value;
  fitNameFont();
});
function fitNameFont() {
  const plate = document.getElementById('namePlate');
  const span  = nameDisplay;
  const maxW  = plate.offsetWidth - 12;
  let fs = Math.min(18, window.innerWidth * 0.04);
  span.style.fontSize = fs + 'px';
  while (span.scrollWidth > maxW && fs > 7) {
    fs -= 0.5;
    span.style.fontSize = fs + 'px';
  }
}
window.addEventListener('resize', fitNameFont);

// ── DEBUG OVERLAY ──
document.getElementById('debugToggle').addEventListener('change', function() {
  const box   = document.getElementById('photoBox');
  const plate = document.getElementById('namePlate');
  if (this.checked) {
    box.style.outline   = '3px solid lime';
    plate.style.outline = '3px solid cyan';
  } else {
    box.style.outline   = '';
    plate.style.outline = '';
  }
});

// ── PHOTO UPLOAD ──
let cropper = null;
document.getElementById('photoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('cropImage').src = ev.target.result;
    openCrop();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function openCrop() {
  document.getElementById('cropModal').classList.add('active');
  setTimeout(() => {
    if (cropper) { cropper.destroy(); cropper = null; }
    // Aspect ratio = width/height of photo box = 45.33/21.69 ≈ 2.09 ... 
    // Wait — that's wider than tall, but the box looks portrait.
    // Actual pixel size: width=408px, height=347px => ratio 408/347 ≈ 1.176
    cropper = new Cropper(document.getElementById('cropImage'), {
      aspectRatio: 408 / 347,
      viewMode: 1,
      autoCropArea: 0.9,
      movable: true,
      zoomable: true,
    });
  }, 200);
}

document.getElementById('cropApplyBtn').addEventListener('click', () => {
  if (!cropper) return;
  const canvas = cropper.getCroppedCanvas({ width: 816, height: 694 });
  const url = canvas.toDataURL('image/jpeg', 0.92);
  const box = document.getElementById('photoBox');
  box.innerHTML = '';
  const img = document.createElement('img');
  img.src = url;
  box.appendChild(img);
  document.getElementById('cropModal').classList.remove('active');
  if (cropper) { cropper.destroy(); cropper = null; }
});

document.getElementById('cropCancelBtn').addEventListener('click', () => {
  document.getElementById('cropModal').classList.remove('active');
  if (cropper) { cropper.destroy(); cropper = null; }
});

// ── DOWNLOAD ──
document.getElementById('downloadBtn').addEventListener('click', async () => {
  const btn = document.getElementById('downloadBtn');
  btn.textContent = '⏳ Generating image...';
  btn.disabled = true;

  // Hide debug outlines before capture
  const box   = document.getElementById('photoBox');
  const plate = document.getElementById('namePlate');
  const savedBoxOutline   = box.style.outline;
  const savedPlateOutline = plate.style.outline;
  box.style.outline   = '';
  plate.style.outline = '';

  try {
    const wrapper = document.getElementById('posterWrapper');
    const canvas = await html2canvas(wrapper, {
      scale: 3,
      useCORS: true,
      allowTaint: true,
      logging: false,
      backgroundColor: null,
    });
    const link = document.createElement('a');
    link.download = 'CA_Sankalp_2026_Frame.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(err) {
    alert('Download failed. Please try again.');
    console.error(err);
  }

  // Restore debug outlines
  box.style.outline   = savedBoxOutline;
  plate.style.outline = savedPlateOutline;

  btn.textContent = '⬇️ Download My Frame';
  btn.disabled = false;
});
</script>
